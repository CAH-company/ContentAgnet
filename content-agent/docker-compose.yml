version: "3.9"

services:
  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - chromadb
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    command: rq worker content --url redis://redis:6379
    depends_on:
      - redis
      - chromadb
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - redis

volumes:
  redis_data:
  chroma_data:
