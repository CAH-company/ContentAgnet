version: "3.9"

services:
  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_started
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    command: rq worker content --url redis://redis:6379
    depends_on:
      redis:
        condition: service_started
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:0.5.23
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - redis

volumes:
  redis_data:
  chroma_data:
